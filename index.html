<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 昱金生能源 - AI 任務看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .last-updated { color: #888; font-size: 0.9em; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-number { font-size: 3em; font-weight: bold; color: #00d9ff; }
        .stat-label { color: #aaa; margin-top: 10px; }
        .section-title { font-size: 1.8em; margin-bottom: 20px; border-left: 4px solid #00d9ff; padding-left: 15px; }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .agent-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .agent-name { font-size: 1.3em; font-weight: bold; }
        .agent-status { padding: 5px 12px; border-radius: 20px; font-size: 0.8em; }
        .agent-role { color: #888; margin-bottom: 10px; }
        .agent-tasks { font-size: 1.1em; }
        .tasks-list { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
        .task-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            align-items: center;
        }
        .task-item:last-child { border-bottom: none; }
        .task-title { font-weight: bold; }
        .task-agent { color: #00d9ff; }
        .task-status, .task-priority { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; text-align: center; }
        @media (max-width: 768px) {
            .task-item { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 昱金生能源 - AI 任務看板</h1>
            <div class="last-updated">最後更新：2026-03-01T20:32:09.372335</div>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">26</div>
                <div class="stat-label">總任務數</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">26</div>
                <div class="stat-label">進行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">待處理</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>
        
        <h2 class="section-title">👥 Agent 團隊狀態</h2>
        <div class="agents-grid">
            
        <div class="agent-card">
            <div class="agent-header">
                <span class="agent-name">Jenny</span>
                <span class="agent-status" style="background:#4CAF50">active</span>
            </div>
            <div class="agent-role">主助理</div>
            <div class="agent-tasks">任務數：<strong>8</strong></div>
        </div>
        
        <div class="agent-card">
            <div class="agent-header">
                <span class="agent-name">Argus</span>
                <span class="agent-status" style="background:#4CAF50">active</span>
            </div>
            <div class="agent-role">監控專家</div>
            <div class="agent-tasks">任務數：<strong>4</strong></div>
        </div>
        
        <div class="agent-card">
            <div class="agent-header">
                <span class="agent-name">Scribe</span>
                <span class="agent-status" style="background:#4CAF50">active</span>
            </div>
            <div class="agent-role">報告專家</div>
            <div class="agent-tasks">任務數：<strong>6</strong></div>
        </div>
        
        <div class="agent-card">
            <div class="agent-header">
                <span class="agent-name">Chronos</span>
                <span class="agent-status" style="background:#4CAF50">active</span>
            </div>
            <div class="agent-role">排程專家</div>
            <div class="agent-tasks">任務數：<strong>3</strong></div>
        </div>
        
        <div class="agent-card">
            <div class="agent-header">
                <span class="agent-name">Athena</span>
                <span class="agent-status" style="background:#4CAF50">active</span>
            </div>
            <div class="agent-role">分析專家</div>
            <div class="agent-tasks">任務數：<strong>3</strong></div>
        </div>
        
        <div class="agent-card">
            <div class="agent-header">
                <span class="agent-name">Hermes</span>
                <span class="agent-status" style="background:#4CAF50">active</span>
            </div>
            <div class="agent-role">通訊專家</div>
            <div class="agent-tasks">任務數：<strong>2</strong></div>
        </div>
        
        </div>
        
        <h2 class="section-title">📋 任務列表</h2>
        <div class="tasks-list">
            <p style='text-align:center;color:#888;'>任務明細將於後續版本中加入</p>
        </div>
    </div>
</body>
</html>
