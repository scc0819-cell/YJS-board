# 自動更新任務看板
# 每小時自動執行，讀取最新任務數據並更新看板

name: Auto Update Task Board

on:
  # 每小時執行
  schedule:
    - cron: '0 * * * *'  # 每小時第 0 分鐘
  
  # 也可手動觸發
  workflow_dispatch:

jobs:
  update-board:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Generate latest task board
        run: |
          python scripts/generate-task-board.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add task-board.json index.html
          git diff --staged --quiet || git commit -m "🤖 Auto-update task board [skip ci]"
          git push
