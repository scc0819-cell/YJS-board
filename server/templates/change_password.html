<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>修改密碼 - 員工日報系統</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei",sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:#fff;border-radius:20px;padding:42px 38px;width:100%;max-width:460px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
    h1{font-size:20px;font-weight:800;color:#111827;margin-bottom:8px;text-align:center}
    p{font-size:13px;color:#6b7280;text-align:center;line-height:1.6;margin-bottom:18px}
    .alert{padding:12px 16px;border-radius:10px;margin:12px 0 18px;font-size:14px}
    .alert-error{background:#f8d7da;color:#721c24;border-left:4px solid #dc3545}
    .alert-success{background:#d4edda;color:#155724;border-left:4px solid #28a745}
    .alert-info{background:#d1ecf1;color:#0c5460;border-left:4px solid #17a2b8}
    .warn{background:#fff7ed;color:#9a3412;border-left:4px solid #f97316}
    label{display:block;margin:10px 0 6px;font-weight:700;color:#374151;font-size:13px}
    input{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;outline:none}
    input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
    .btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
    .rules{margin-top:14px;background:#f9fafb;border-radius:10px;padding:12px 14px;color:#6b7280;font-size:12px;line-height:1.6}
    .rules strong{color:#111827}
    .links{margin-top:14px;text-align:center;font-size:13px}
    .links a{color:#4f46e5;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h1>🔐 修改密碼</h1>
    <p>為了帳號安全，請定期更新密碼。</p>

    {% if forced %}
      <div class="alert warn">⚠️ 您目前使用的是「臨時密碼」，請先完成修改後才能繼續使用系統。</div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
      <label>舊密碼</label>
      <input type="password" name="old_password" required placeholder="請輸入舊密碼"/>

      <label>新密碼</label>
      <input type="password" name="new_password" required placeholder="請輸入新密碼"/>

      <label>確認新密碼</label>
      <input type="password" name="confirm_password" required placeholder="請再輸入一次新密碼"/>

      <button type="submit" class="btn">更新密碼</button>
    </form>

    <div class="rules">
      <strong>密碼規則</strong><br>
      - 至少 8 碼<br>
      - 同時包含英文字母與數字<br>
      - 不可包含空白
    </div>

    <div class="links">
      <a href="/">返回首頁</a>
    </div>
  </div>
</body>
</html>
