<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 OpenClaw 任務看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .task-card { transition: all 0.3s; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .status-running { border-left: 4px solid #3b82f6; }
        .status-completed { border-left: 4px solid #22c55e; }
        .status-pending { border-left: 4px solid #f59e0b; }
        .status-failed { border-left: 4px solid #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold text-gray-800">🦞 OpenClaw 任務看板</h1>
                <p class="text-gray-600 mt-2 text-lg">自動化任務管理系統 · 即時監控</p>
            </div>
            <div class="flex gap-3">
                <button onclick="refreshData()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <span>🔄</span> 重新整理
                </button>
                <button onclick="openAddTaskModal()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                    <span>➕</span> 新增任務
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-500 font-medium">🔄 執行中</div>
                        <div id="stat-running" class="text-4xl font-bold text-blue-600 mt-1">0</div>
                    </div>
                    <div class="text-4xl">🚀</div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-500 font-medium">⏳ 待處理</div>
                        <div id="stat-pending" class="text-4xl font-bold text-yellow-600 mt-1">0</div>
                    </div>
                    <div class="text-4xl">📋</div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-500 font-medium">✅ 已完成</div>
                        <div id="stat-completed" class="text-4xl font-bold text-green-600 mt-1">0</div>
                    </div>
                    <div class="text-4xl">🎉</div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-500 font-medium">❌ 失敗</div>
                        <div id="stat-failed" class="text-4xl font-bold text-red-600 mt-1">0</div>
                    </div>
                    <div class="text-4xl">⚠️</div>
                </div>
            </div>
        </div>

        <!-- Active Tasks -->
        <div class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>📌</span> 進行中任務
            </h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="active-tasks-container">
                <!-- Tasks will be loaded here -->
                <div class="col-span-full text-center py-12 text-gray-500">
                    <div class="animate-pulse">載入中...</div>
                </div>
            </div>
        </div>

        <!-- Cron Jobs Section -->
        <div class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>⏰</span> 自動化排程
            </h2>
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">任務名稱</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">描述</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">排程</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">狀態</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">下次執行</th>
                            </tr>
                        </thead>
                        <tbody id="cron-tbody" class="bg-white divide-y divide-gray-200">
                            <!-- Cron jobs will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div>
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>📊</span> 最近活動
            </h2>
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                <div id="activity-log" class="space-y-3">
                    <!-- Activity will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div id="add-task-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold text-gray-800 mb-6">➕ 新增任務</h3>
            <form id="add-task-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">任務名稱</label>
                    <input type="text" id="task-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <textarea id="task-desc" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Agent</label>
                    <select id="task-agent" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="main">Jenny (主助理)</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">建立</button>
                    <button type="button" onclick="closeAddTaskModal()" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-300 transition">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '';

        async function loadData() {
            try {
                const [tasksRes, cronRes] = await Promise.all([
                    fetch('/api/tasks').then(r => r.json()),
                    fetch('/api/cron').then(r => r.json()).catch(() => [])
                ]);
                
                renderTasks(tasksRes);
                renderCronJobs(Array.isArray(cronRes) ? cronRes : []);
                updateStats(tasksRes);
                renderActivity(tasksRes);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('active-tasks-container').innerHTML = 
                    '<div class="col-span-full text-center py-12 text-red-500">載入失敗，請重試</div>';
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('active-tasks-container');
            const activeTasks = tasks.filter(t => t.status !== 'completed').reverse();
            
            if (activeTasks.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">目前沒有進行中的任務 🎉</div>';
                return;
            }

            container.innerHTML = activeTasks.map(task => `
                <div class="task-card status-${task.status} bg-white rounded-xl shadow-lg p-6 border border-gray-100">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-semibold text-gray-800">${escapeHtml(task.name)}</h3>
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${getStatusClass(task.status)}">
                            ${getStatusText(task.status)}
                        </span>
                    </div>
                    <p class="text-gray-600 mb-4">${escapeHtml(task.description || '')}</p>
                    <div class="flex justify-between items-center text-sm text-gray-500">
                        <span class="flex items-center gap-2">
                            <span>🤖</span> ${escapeHtml(task.agent || 'main')}
                        </span>
                        <span class="flex items-center gap-2">
                            <span>🕐</span> ${formatTime(task.createdAt)}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function renderCronJobs(cronJobs) {
            const tbody = document.getElementById('cron-tbody');
            if (!cronJobs || cronJobs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">目前沒有排程任務</td></tr>';
                return;
            }

            tbody.innerHTML = cronJobs.map(job => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-semibold text-gray-900">${escapeHtml(job.name || 'Unnamed')}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-600">${escapeHtml(job.description || '')}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-600 font-mono">${formatSchedule(job.schedule)}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${job.enabled ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${job.enabled ? '✅ 啟用' : '❌ 停用'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                        ${job.state?.nextRunAtMs ? formatTime(job.state.nextRunAtMs) : '尚未排程'}
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(tasks) {
            const stats = { running: 0, pending: 0, completed: 0, failed: 0 };
            tasks.forEach(task => {
                if (stats[task.status] !== undefined) stats[task.status]++;
            });
            document.getElementById('stat-running').textContent = stats.running;
            document.getElementById('stat-pending').textContent = stats.pending;
            document.getElementById('stat-completed').textContent = stats.completed;
            document.getElementById('stat-failed').textContent = stats.failed;
        }

        function renderActivity(tasks) {
            const container = document.getElementById('activity-log');
            const recent = tasks.slice(-5).reverse();
            
            if (recent.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">暫無活動記錄</div>';
                return;
            }

            container.innerHTML = recent.map(task => `
                <div class="flex items-center gap-4 p-3 bg-gray-50 rounded-lg">
                    <span class="text-xl">${getStatusIcon(task.status)}</span>
                    <div class="flex-1">
                        <div class="font-medium text-gray-800">${escapeHtml(task.name)}</div>
                        <div class="text-sm text-gray-500">${formatTime(task.createdAt)}</div>
                    </div>
                    <span class="text-sm text-gray-600">🤖 ${task.agent || 'main'}</span>
                </div>
            `).join('');
        }

        function getStatusClass(status) {
            const classes = {
                running: 'bg-blue-100 text-blue-800',
                pending: 'bg-yellow-100 text-yellow-800',
                completed: 'bg-green-100 text-green-800',
                failed: 'bg-red-100 text-red-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        function getStatusText(status) {
            const texts = {
                running: '🔄 執行中',
                pending: '⏳ 待處理',
                completed: '✅ 已完成',
                failed: '❌ 失敗'
            };
            return texts[status] || status;
        }

        function getStatusIcon(status) {
            const icons = {
                running: '🔄',
                pending: '⏳',
                completed: '✅',
                failed: '❌'
            };
            return icons[status] || '❓';
        }

        function formatSchedule(schedule) {
            if (!schedule) return '-';
            if (schedule.kind === 'cron') return schedule.expr || '-';
            if (schedule.kind === 'every') {
                const mins = Math.round((schedule.everyMs || 0) / 60000);
                if (mins >= 60) return `每${Math.round(mins/60)}小時`;
                return `每${mins}分鐘`;
            }
            return '-';
        }

        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-TW', { 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openAddTaskModal() {
            document.getElementById('add-task-modal').classList.remove('hidden');
        }

        function closeAddTaskModal() {
            document.getElementById('add-task-modal').classList.add('hidden');
            document.getElementById('add-task-form').reset();
        }

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskData = {
                name: document.getElementById('task-name').value,
                description: document.getElementById('task-desc').value,
                agent: document.getElementById('task-agent').value,
                status: 'pending'
            };

            try {
                const res = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(taskData)
                });
                if (res.ok) {
                    closeAddTaskModal();
                    loadData();
                } else {
                    alert('建立失敗');
                }
            } catch (error) {
                alert('建立失敗：' + error.message);
            }
        });

        function refreshData() {
            loadData();
        }

        // Initial load
        loadData();
        // Auto refresh every 10 seconds
        setInterval(loadData, 10000);
    </script>
</body>
</html>
